  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#378ADD',
              light: '#E6F1FB',
              dark: '#185FA5',
            },
            secondary: {
              DEFAULT: '#1D9E75',
              light: '#E1F5EE',
            },
          },
          fontFamily: {
            sans: ['Inter', 'Segoe UI', 'system-ui', 'sans-serif'],
          },

    };

  <!-- Design tokens -->
  <link rel="stylesheet" href="/css/variables.css" />
  <!-- Design system (buttons, inputs, badges, tables, responsive) -->
  <link rel="stylesheet" href="/css/design-system.css" />

  <!-- App styles inline (minimal overrides) -->
  <style>
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }

    /* Sidebar active link */
    .nav-link.active {
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 600;
    }
    .nav-link.active .nav-icon { color: var(--primary); }

    /* Page fade-in */
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-enter { animation: pageFadeIn 0.25s ease forwards; }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* Spinner */
    .spinner {
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      width: 2rem;
      height: 2rem;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Gantt bar */
    .gantt-bar {
      border-radius: var(--radius-sm);
      transition: filter 0.15s ease, transform 0.15s ease;
      cursor: pointer;
    }
    .gantt-bar:hover {
      filter: brightness(1.1);
      transform: scaleY(1.04);
    }

    /* Scrollable Gantt area */
    .gantt-scroll { overflow-x: auto; overflow-y: auto; }
  </style>
</head>
<body class="bg-white text-gray-900">

  <!-- App root -->
  <div id="app"></div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Entry point -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
